apiVersion: apps/v1
kind: Deployment
metadata:
  name: petrosa-cio
  labels:
    app: petrosa-cio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petrosa-cio
  template:
    metadata:
      labels:
        app: petrosa-cio
    spec:
      containers:
      - name: cio-strategist
        image: petrosa-cio:latest  # Replace with actual image tag in CI/CD
        env:
        - name: NATS_URL
          value: "nats://nats-service:4222"
        - name: DATA_MANAGER_URL
          value: "http://petrosa-data-manager:8000"
        - name: TRADEENGINE_URL
          value: "http://petrosa-tradeengine:8000"
        - name: STRATEGY_API_URL
          value: "http://petrosa-ta-bot:8000"
        - name: LLM_PROVIDER
          value: "mock"
        - name: ENVIRONMENT
          value: "production"
        # Optional: Add resource limits for production
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
