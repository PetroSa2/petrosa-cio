apiVersion: apps/v1
kind: Deployment
metadata:
  name: petrosa-cio
  labels:
    app: petrosa-cio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petrosa-cio
  template:
    metadata:
      labels:
        app: petrosa-cio
    spec:
      containers:
      - name: cio-strategist
        image: petrosa-cio:latest  # Replace with actual image tag in CI/CD
        env:
        - name: NATS_URL
          value: "nats://nats-service:4222"
        - name: DATA_MANAGER_URL
          value: "http://petrosa-data-manager:8000"
        - name: TRADEENGINE_URL
          value: "http://petrosa-tradeengine:8000"
        - name: STRATEGY_API_URL
          value: "http://petrosa-ta-bot:8000"
        - name: LLM_PROVIDER
          value: "mock"
        - name: ENVIRONMENT
          value: "production"
        - name: REDIS_URL
          value: "redis://petrosa-redis:6379"
        - name: ENABLE_OTEL
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: petrosa-common-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: OTEL_METRICS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: petrosa-common-config
              key: OTEL_METRICS_EXPORTER
        - name: OTEL_TRACES_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: petrosa-common-config
              key: OTEL_TRACES_EXPORTER
        - name: OTEL_LOGS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: petrosa-common-config
              key: OTEL_LOGS_EXPORTER
        - name: OTEL_EXPORTER_OTLP_HEADERS
          valueFrom:
            secretKeyRef:
              name: petrosa-sensitive-credentials
              key: OTEL_EXPORTER_OTLP_HEADERS
        # Optional: Add resource limits for production
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
