name: Deploy

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      reason:
        description: 'Reason for deployment (audit trail)'
        required: true
        type: string
        default: 'Automatic deployment on push'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Get current version
        id: current_version
        run: |
          # Get latest tag, default to v0.0.0 if no tags exist
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Current version: $CURRENT"
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump_version
        run: |
          chmod +x scripts/bump-version.sh
          # Use input version_bump if available (manual), else default to patch (automatic)
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          if [ -z "$BUMP_TYPE" ]; then
            BUMP_TYPE="patch"
          fi
          NEW_VERSION=$(./scripts/bump-version.sh "${{ steps.current_version.outputs.version }}" "$BUMP_TYPE")
          
          # Add run number and sha suffix for non-tagged builds to ensure uniqueness
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          UNIQUE_VERSION="${NEW_VERSION}-r${{ github.run_number }}-${SHORT_SHA}"
          
          echo "New version: $NEW_VERSION"
          echo "Unique version: $UNIQUE_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "unique_version=$UNIQUE_VERSION" >> $GITHUB_OUTPUT

      - name: Create git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump_version.outputs.new_version }}" -m "Manual deployment: ${{ inputs.reason }}"
          git push origin "${{ steps.bump_version.outputs.new_version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/petrosa-cio:${{ steps.bump_version.outputs.unique_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/petrosa-cio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate GitOps Bot Token
        uses: tibdex/github-app-token@v2
        id: generate-token
        with:
          app_id: ${{ secrets.GITOPS_APP_ID }}
          installation_id: ${{ secrets.GITOPS_APP_INSTALLATION_ID }}
          private_key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}

      - name: Checkout petrosa_k8s
        uses: actions/checkout@v4
        with:
          repository: PetroSa2/petrosa_k8s
          ref: main
          token: ${{ steps.generate-token.outputs.token }}
          path: petrosa_k8s

      - name: Rebase on main
        run: ./scripts/gitops-rebase-main.sh
        working-directory: petrosa_k8s

      - name: Update cio image tag in GitOps manifests
        run: |
          VERSION="${{ steps.bump_version.outputs.unique_version }}"
          # Update the image tag in manifests
          find petrosa_k8s/k8s/cio -type f \( -name "*.yaml" -o -name "*.yml" \) -print0 | xargs -0 -r sed -i "s/VERSION_PLACEHOLDER/$VERSION/g"
          
          # Also update the version label if needed
          find petrosa_k8s/k8s/cio -type f \( -name "*.yaml" -o -name "*.yml" \) -print0 | xargs -0 -r sed -i "s/version: VERSION_PLACEHOLDER/version: $VERSION/g"
          
          echo "Updated cio image tag to $VERSION in petrosa_k8s/k8s/cio/"

      - name: Commit and push to petrosa_k8s
        working-directory: petrosa_k8s
        run: |
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git add k8s/cio/
          if git diff --staged --quiet; then
            echo "No changes to commit (version might already be up to date)"
          else
            git commit -m "gitops: cio image ${{ steps.bump_version.outputs.unique_version }}"
            git push origin main
          fi

      - name: Create summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # GitOps Push Successful ✅

          ## Details
          - **Service**: `cio`
          - **Version**: `${{ steps.bump_version.outputs.unique_version }}`
          - **Triggered by**: @${{ github.actor }}
          EOF
