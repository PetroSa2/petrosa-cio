# Standardized Ruff Configuration for Petrosa Services
# Replaces: black, isort, flake8

target-version = "py311"
line-length = 88
indent-width = 4

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
]

extend-ignore = [
    "E501",    # line too long (ruff format handles this)
    "E722",    # bare except
    "UP042",   # Class inherits from both str and Enum
]

exclude = [
    ".venv",
    "venv",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
